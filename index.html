<!doctype html>
<html lang="en">
  <head>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-25537837-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "UA-25537837-1");
    </script>

    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="Ariel Noyman" />
    <meta name="author" content="Ariel Noyman" />
    <!-- add icon  -->
    <link rel="icon" href="img/an.png" type="image/png" sizes="16x16" />
    <title>Ariel Noyman</title>

    <!-- jquery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- Include FontAwesome CSS -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..700&family=Open+Sans:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/base.css" rel="stylesheet" />
    <link href="css/edits.css" rel="stylesheet" />
  </head>

  <body>
    <div id="site-header"></div>

    <main id="content" class="homepage-main">
      <div id="about"></div>

      <div id="projects"></div>

      <section class="selected-work-section" id="selected-work">
        <div class="selected-work-intro">
          <h1>Publications, Talks, Awards</h1>
          <p class="">
            Selected. For the full list,
            <a
              href="https://github.com/RELNO/resume/releases/download/latest/resume.pdf"
              target="_blank"
              rel="noopener"
              class="alert-link"
              >see the resume (pdf)
            </a>
          </p>
        </div>
      </section>

      <section
        class="selected-work-grid selected-work-columns"
        aria-label="Selected publications, talks, and awards"
      >
        <div class="selected-work-column" id="selected-publications"></div>
        <div class="selected-work-column" id="selected-talks"></div>
        <div class="selected-work-column" id="selected-awards"></div>
      </section>
    </main>

    <div id="footer"></div>

    <script>
      // create a div with the id "awards" and load the content of the file "awards.html" into it
      $(function () {
        const partialVersion = "20260616-4";
        const partial = (path) => `${path}?v=${partialVersion}`;

        $("#site-header").load(partial("sections/site-header.html"));
        $("#about").load(partial("sections/about.html"));
        $("#projects").load(partial("projects/projects.html"));
        $("#selected-publications").load(partial("sections/publications.html"));
        $("#selected-talks").load(partial("sections/talks.html"));
        $("#selected-awards").load(partial("sections/awards.html"));
        $("#footer").load(partial("footer/footer.html"));
      });
    </script>
  </body>
</html>
