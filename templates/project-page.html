<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{metaDescription}}" />
    <meta name="author" content="Ariel Noyman" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    <link rel="icon" href="/img/favicon.png" type="image/png" sizes="16x16" />
    <title>{{pageTitle}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link href="/css/base.css" rel="stylesheet" />
    <link href="/css/edits.css?v=20260720-1" rel="stylesheet" />
  </head>
  <body class="{{bodyClass}}">
    <header class="project-home-header">
      <div class="project-home-shell">
        <a class="project-home-link" href="/" aria-label="Back to website">
          <span class="project-home-x" aria-hidden="true">X</span>
          <span>Back to website</span>
        </a>
      </div>
    </header>

    <main id="content" class="project-page-main">
      <article class="{{articleClass}}">
        {{projectLeadMedia}}

        {{projectHero}}

        {{projectInfo}}

        {{projectGallery}}
      </article>
    </main>

    {{siteFooter}}
  </body>
</html>
