<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="Writings by Ariel Noyman on architecture, cities, technology, and education."
    />
    <meta name="author" content="Ariel Noyman" />
    <link rel="icon" href="/img/favicon.png" type="image/png" sizes="16x16" />
    <title>Writings | Ariel Noyman</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..700&family=Open+Sans:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link href="/css/base.css" rel="stylesheet" />
    <link href="/css/edits.css?v=20260630-9" rel="stylesheet" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"
    ></script>
    <script defer src="/js/writings.js?v=20260630-1"></script>
  </head>

  <body class="writings-page">
    <div id="site-header">
      <header class="site-header">
        <div class="site-header-shell">
          <a class="site-brand" href="/" aria-label="Ariel Noyman home">
            Ariel Noyman
          </a>
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="/#work">Work</a>
            <a href="/#selected-work">Publications, Talks, Awards</a>
            <a href="/writings/" aria-current="page">Writings</a>
          </nav>
        </div>
      </header>
    </div>

    <main class="writings-main" id="content">
      <aside class="writings-sidebar" aria-label="Writing archive">
        <nav class="writings-archive">
          <h2>Writings</h2>
          <div
            class="writings-archive-list"
            id="writingArchive"
            aria-live="polite"
          >
            <p class="writing-loading">Loading writings...</p>
          </div>
        </nav>
      </aside>

      <article class="writing-article" id="writingArticle" aria-live="polite">
        <header class="writing-header">
          <h1 id="writingTitle">Loading...</h1>
          <p class="writing-subtitle" id="writingSubtitle"></p>
          <p class="writing-date" id="writingDate"></p>
        </header>

        <figure class="writing-cover" id="writingCover" hidden>
          <img id="writingCoverImage" alt="" />
          <figcaption id="writingCoverCaption"></figcaption>
        </figure>

        <div class="writing-body" id="writingBody"></div>
      </article>
    </main>

    <div id="footer"></div>
  </body>
</html>
